<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Ex-Student Association Otarhat High School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script>
        // আপনার Firebase কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
            authDomain: "school-mangament.firebaseapp.com",
            projectId: "school-mangament",
            storageBucket: "school-mangament.firebasestorage.app",
            messagingSenderId: "593087054757",
            appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
        };
        // ইনিশিয়ালাইজেশন
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body class="bg-slate-50 text-slate-800">

<!-- Header -->
<section class="bg-[#0E2144] py-20 px-4 text-center">
    <span class="text-[#C8A951] font-bold text-sm tracking-[0.2em] uppercase">Who We Are</span>
    <h1 class="text-4xl md:text-5xl font-extrabold text-white mt-3">About the Association</h1>
</section>

<!-- Content -->
<main class="max-w-3xl mx-auto px-4 -mt-10 mb-16">
    <div class="bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-slate-100">
        <img id="about-image" class="w-full h-64 md:h-96 object-cover rounded-2xl mb-8 hidden shadow-lg">
        
        <div id="about-content" class="text-lg leading-relaxed text-slate-600 space-y-6">
            <div class="animate-pulse space-y-4">
                <div class="h-4 bg-slate-200 rounded w-full"></div>
                <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                <div class="h-4 bg-slate-200 rounded w-2/3"></div>
            </div>
        </div>
    </div>
</main>

<script>
    // ডাটা লোড ফাংশন
    db.collection("siteContent").doc("about").onSnapshot((doc) => {
        const box = document.getElementById("about-content");
        const img = document.getElementById("about-image");
        
        if (!doc.exists) {
            box.innerHTML = `<p class="text-center text-slate-400">No content available.</p>`;
            return;
        }

        const d = doc.data();

        // ইমেজ আপডেট
        if (d.image && d.image.trim() !== "") {
            img.src = d.image;
            img.classList.remove("hidden");
        } else {
            img.classList.add("hidden");
        }

        // কন্টেন্ট আপডেট
        if (d.content && d.content.trim() !== "") {
            box.innerHTML = d.content.split("\n")
                .filter(l => l.trim())
                .map(l => `<p class="text-slate-700">${l}</p>`)
                .join("");
        } else {
            box.innerHTML = `<p class="text-slate-500">No description added yet.</p>`;
        }
    }, (err) => {
        console.error("Error loading data: ", err);
        document.getElementById("about-content").innerHTML = `<p class="text-red-500">Could not load content.</p>`;
    });
</script>

</body>
</html>
