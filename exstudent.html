<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex Students | Ex-Student Association</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
            authDomain: "school-mangament.firebaseapp.com",
            projectId: "school-mangament",
            storageBucket: "school-mangament.firebasestorage.app",
            messagingSenderId: "593087054757",
            appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body class="bg-slate-50 text-slate-800">

<!-- Header -->
<section class="bg-[#0E2144] py-20 px-4 text-center">
    <h1 class="text-4xl font-extrabold text-white">Our Ex-Students</h1>
    <p class="text-[#C8A951] mt-2 font-medium">Alumni Directory</p>
</section>

<main class="max-w-6xl mx-auto px-4 py-12">
    <!-- Filter & Search Section -->
    <div class="flex flex-col md:flex-row gap-4 mb-10 items-center justify-between">
        <select id="batch-filter" class="w-full md:w-48 px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-[#2F6FED] bg-white">
            <option value="all">All Batches</option>
        </select>
        <input id="student-search" placeholder="Search by name or occupation..." class="w-full md:w-80 px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-[#2F6FED]">
    </div>

    <!-- Alumni Grid -->
    <div id="student-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- Loading State -->
        <div class="col-span-full text-center py-10">Loading Alumni...</div>
    </div>
</main>

<script>
    let allStudents = [];
    let activeBatch = "all";
    let searchTerm = "";

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Firebase থেকে ডেটা আনা
    db.collection("exStudents").onSnapshot((snap) => {
        allStudents = snap.docs.map((d) => ({ id: d.id, ...d.data() })).filter((s) => s.status !== "inactive");
        
        // ব্যাচ লিস্ট তৈরি করা
        const batches = [...new Set(allStudents.map(s => s.batch).filter(Boolean))].sort().reverse();
        const batchSelect = document.getElementById("batch-filter");
        batchSelect.innerHTML = `<option value="all">All Batches</option>` + 
            batches.map(b => `<option value="${escapeHtml(b)}">Batch ${escapeHtml(b)}</option>`).join("");
        
        render();
    });

    function render() {
        let items = allStudents;
        if (activeBatch !== "all") items = items.filter((s) => s.batch === activeBatch);
        if (searchTerm) items = items.filter((s) => 
            (s.name || "").toLowerCase().includes(searchTerm) || 
            (s.occupation || "").toLowerCase().includes(searchTerm)
        );
        
        const grid = document.getElementById("student-grid");
        if (!items.length) { 
            grid.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400">No students found.</div>`; 
            return; 
        }
        
        grid.innerHTML = items.map((s) => `
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center hover:shadow-lg transition">
                <img src="${s.photo || 'https://placehold.co/200x200?text=Photo'}" class="w-24 h-24 rounded-full object-cover mx-auto mb-4 border-4 border-blue-50">
                <h3 class="font-bold text-lg text-[#0E2144]">${escapeHtml(s.name || '')}</h3>
                <p class="text-xs text-[#2F6FED] font-bold mt-1">Batch: ${escapeHtml(s.batch || '-')}</p>
                <p class="text-xs text-slate-500 mt-1 uppercase italic">${escapeHtml(s.occupation || '')}</p>
                <p class="text-xs text-slate-600 mt-4 leading-relaxed line-clamp-3">${escapeHtml(s.description || '')}</p>
            </div>`).join("");
    }

    // ইভেন্ট লিসেনার
    document.getElementById("batch-filter").addEventListener("change", (e) => {
        activeBatch = e.target.value;
        render();
    });

    document.getElementById("student-search").addEventListener("input", (e) => {
        searchTerm = e.target.value.toLowerCase();
        render();
    });
</script>
</body>
</html>
