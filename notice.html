<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>নোটিশ বোর্ড | Ex-Student Association</title>
<!-- Fonts & Tailwind -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { fontFamily:{sans:['Inter','sans-serif'],display:['Manrope','sans-serif']}, colors:{brand:'#0E2144',accent:'#2F6FED',gold:'#C8A951'} } }
  };
</script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
    authDomain: "school-mangament.firebaseapp.com",
    projectId: "school-mangament",
    storageBucket: "school-mangament.firebasestorage.app",
    messagingSenderId: "593087054757",
    appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<style>
  .notice-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
  .notice-card:hover { border-color: #cbd5e1; transform: translateY(-2px); }
  .skeleton{ background:linear-gradient(90deg,#e7ebf3 25%,#f2f4f9 37%,#e7ebf3 63%); background-size:400% 100%; animation:sk 1.4s ease infinite; border-radius:1rem; }
  @keyframes sk{ 0%{background-position:100% 50%} 100%{background-position:0 50%} }
</style>
</head>
<body class="bg-slate-50">

<section class="bg-brand py-20 px-4 text-center text-white">
    <span class="text-gold font-bold text-xs uppercase tracking-widest bg-white/10 px-3 py-1 rounded-full">📢 Stay Updated</span>
    <h1 class="font-display font-extrabold text-4xl mt-4">নোটিশ বোর্ড</h1>
</section>

<main class="max-w-3xl mx-auto px-4 -mt-10 mb-20">
    <div class="bg-white p-2 rounded-2xl shadow-lg mb-8 flex items-center border border-slate-100">
        <span class="material-symbols-rounded text-slate-400 ml-3">search</span>
        <input id="notice-search" placeholder="নোটিশ খুঁজুন..." class="w-full px-4 py-3 outline-none text-sm">
    </div>

    <div id="notice-container" class="space-y-6">
        <div class="skeleton h-32"></div>
        <div class="skeleton h-32"></div>
    </div>
</main>

<script>
let allNotices = [], searchTerm = "";

// Firebase থেকে রিয়েল-টাইম ডেটা আনা
db.collection("notices")
  .orderBy("createdAt", "desc")
  .onSnapshot((snap) => {
    allNotices = snap.docs
      .map((d) => ({ id: d.id, ...d.data() }))
      .filter((n) => n.published !== false && n.status !== "inactive");
    render();
  });

function render() {
  let items = allNotices;
  if (searchTerm) {
    items = items.filter((n) => (n.title || "").toLowerCase().includes(searchTerm) || (n.description || "").toLowerCase().includes(searchTerm));
  }
  items = [...items].sort((a, b) => (b.pinned === true) - (a.pinned === true));
  
  const container = document.getElementById("notice-container");
  if (!items.length) { 
    container.innerHTML = `<div class="text-center py-10 opacity-50"><p>বর্তমানে কোনো নোটিশ পাওয়া যায়নি।</p></div>`; 
    return; 
  }

  container.innerHTML = items.map((n) => `
    <div class="notice-card bg-white rounded-3xl p-6 shadow-sm">
      <div class="flex items-center justify-between mb-4">
        ${n.pinned ? `<span class="bg-gold text-white text-[10px] font-bold px-3 py-1 rounded-full flex items-center gap-1"><span class="material-symbols-rounded text-xs">push_pin</span>PINNED</span>` : "<span></span>"}
        <span class="text-[11px] text-slate-400 font-medium bg-slate-100 px-3 py-1 rounded-full">${fmtDate(n.createdAt)}</span>
      </div>
      
      <h3 class="font-display font-bold text-xl text-brand mb-3">${escapeHtml(n.title || "")}</h3>
      
      ${n.attachment ? `<img src="${n.attachment}" class="w-full rounded-2xl mb-4 shadow-sm border border-slate-100">` : ""}
      
      <p class="text-slate-600 text-sm leading-relaxed whitespace-pre-line mb-4">${escapeHtml(n.description || "")}</p>
    </div>`).join("");
}

// Helpers
function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('bn-BD', { day:'2-digit', month:'short', year:'numeric' });
}
document.getElementById("notice-search").addEventListener("input", (e) => { searchTerm = e.target.value.toLowerCase(); render(); });
</script>
</body>
</html>
