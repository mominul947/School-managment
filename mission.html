<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission & Vision | Ex-Student Association</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
            authDomain: "school-mangament.firebaseapp.com",
            projectId: "school-mangament",
            storageBucket: "school-mangament.firebasestorage.app",
            messagingSenderId: "593087054757",
            appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body class="bg-slate-50 text-slate-800">

<!-- Header -->
<section class="bg-[#0E2144] py-20 px-4 text-center">
    <p class="text-[#C8A951] font-bold text-xs uppercase tracking-widest mb-2">What Drives Us</p>
    <h1 class="text-4xl font-extrabold text-white">Mission & Vision</h1>
</section>

<!-- Content -->
<main class="max-w-5xl mx-auto px-4 py-14 grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <!-- Mission Card -->
    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
        <span class="material-symbols-rounded text-4xl text-[#2F6FED] mb-4">rocket_launch</span>
        <h2 class="font-bold text-xl mb-4 text-[#0E2144]">Our Mission</h2>
        <div id="mission-text" class="text-slate-600 leading-relaxed space-y-3">
            <p>Loading...</p>
        </div>
    </div>

    <!-- Vision Card -->
    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
        <span class="material-symbols-rounded text-4xl text-[#C8A951] mb-4">visibility</span>
        <h2 class="font-bold text-xl mb-4 text-[#0E2144]">Our Vision</h2>
        <div id="vision-text" class="text-slate-600 leading-relaxed space-y-3">
            <p>Loading...</p>
        </div>
    </div>

</main>

<script>
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Firebase থেকে ডেটা ফেচ করা
    db.collection("siteContent").doc("missionVision").onSnapshot((doc) => {
        const mEl = document.getElementById("mission-text");
        const vEl = document.getElementById("vision-text");
        
        if (doc.exists) {
            const data = doc.data();
            
            // মিশন টেক্সট রেন্ডার
            mEl.innerHTML = data.mission 
                ? data.mission.split("\n").map(l => `<p>${escapeHtml(l)}</p>`).join("") 
                : '<p>No mission content added yet.</p>';
                
            // ভিশন টেক্সট রেন্ডার
            vEl.innerHTML = data.vision 
                ? data.vision.split("\n").map(l => `<p>${escapeHtml(l)}</p>`).join("") 
                : '<p>No vision content added yet.</p>';
        } else {
            mEl.innerHTML = '<p>Content not found.</p>';
            vEl.innerHTML = '<p>Content not found.</p>';
        }
    }, (error) => {
        console.error("Error loading content:", error);
    });
</script>
</body>
</html>
