<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission & Vision | Ex-Student Association Otarhat High School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily:{sans:['Inter','sans-serif'],display:['Manrope','sans-serif']}, colors:{brand:'#0E2144',accent:'#2F6FED',gold:'#C8A951'} } } };</script>
<link rel="stylesheet" href="assets/style.css">
<style>.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
</head>
<body class="pb-16 lg:pb-0">
<div id="site-header"></div>

<section class="pt-32 pb-10 bg-brand text-center">
  <p class="text-gold font-bold text-xs uppercase tracking-widest mb-2">What Drives Us</p>
  <h1 class="font-display font-extrabold text-3xl md:text-4xl text-white">Mission & Vision</h1>
</section>

<main class="max-w-5xl mx-auto px-4 py-14 grid grid-cols-1 md:grid-cols-2 gap-6" id="mv-grid">
  <div class="surface card p-8">
    <span class="material-symbols-rounded text-4xl text-accent mb-4">rocket_launch</span>
    <h2 class="font-display font-extrabold text-xl mb-3">Our Mission</h2>
    <div id="mission-text" class="text-[15px] leading-relaxed opacity-80 space-y-3"><div class="skeleton h-4 w-full mb-2"></div><div class="skeleton h-4 w-4/5"></div></div>
  </div>
  <div class="surface card p-8">
    <span class="material-symbols-rounded text-4xl text-gold mb-4">visibility</span>
    <h2 class="font-display font-extrabold text-xl mb-3">Our Vision</h2>
    <div id="vision-text" class="text-[15px] leading-relaxed opacity-80 space-y-3"><div class="skeleton h-4 w-full mb-2"></div><div class="skeleton h-4 w-4/5"></div></div>
  </div>
</main>

<div id="site-footer"></div>
<script src="assets/site.js"></script>
<script>
bootSite("mission.html");
db.collection("siteContent").doc("missionVision").onSnapshot((doc) => {
  const m = document.getElementById("mission-text"), v = document.getElementById("vision-text");
  const d = doc.exists ? doc.data() : {};
  m.innerHTML = (d.mission || "").split("\n").filter((l) => l.trim()).map((l) => `<p>${escapeHtml(l)}</p>`).join("") || `<div class="empty-state">No mission text added yet.</div>`;
  v.innerHTML = (d.vision || "").split("\n").filter((l) => l.trim()).map((l) => `<p>${escapeHtml(l)}</p>`).join("") || `<div class="empty-state">No vision text added yet.</div>`;
}, () => {});
</script>
</body>
</html>
