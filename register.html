<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Ex-Student Association</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
    authDomain: "school-mangament.firebaseapp.com",
    projectId: "school-mangament",
    storageBucket: "school-mangament.firebasestorage.app",
    messagingSenderId: "593087054757",
    appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>
<style>.auth-bg{background:linear-gradient(135deg,#0E2144,#16305C 60%,#2F6FED);}</style>
</head>
<body class="min-h-screen auth-bg flex items-center justify-center p-4">

<div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 md:p-10">
  <div class="text-center mb-8">
    <h1 class="font-bold text-2xl text-[#0E2144]">Create Account</h1>
    <p class="text-sm text-slate-500 mt-1">Join the Ex-Student Association</p>
  </div>

  <div id="pending-notice" class="hidden text-center py-6">
    <span class="material-symbols-rounded text-5xl text-amber-500 mb-3">pending_actions</span>
    <p class="font-bold text-lg">Registration Submitted!</p>
    <p class="text-sm text-slate-600 mt-2">Admin will review your profile shortly.</p>
    <a href="login.html" class="block bg-[#0E2144] text-white py-3 rounded-xl font-bold text-sm mt-5">Go to Login</a>
  </div>

  <form id="register-form" class="space-y-4">
    <input required id="rg-name" placeholder="Full Name" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
    <input required type="email" id="rg-email" placeholder="Email" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
    <input required id="rg-phone" placeholder="Phone Number" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
    <input required id="rg-batch" placeholder="Batch (e.g. 2010)" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
    <input required type="password" id="rg-pass" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
    <input required type="password" id="rg-pass2" placeholder="Confirm Password" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
    <button type="submit" id="register-submit" class="w-full py-3 bg-[#0E2144] text-white rounded-xl font-bold text-sm hover:bg-blue-900 transition">Create Account</button>
  </form>
</div>

<script>
document.getElementById("register-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pass = document.getElementById("rg-pass").value, pass2 = document.getElementById("rg-pass2").value;
  if (pass !== pass2) { alert("Passwords do not match."); return; }
  const btn = document.getElementById("register-submit");
  btn.disabled = true; btn.textContent = "Creating...";
  try {
    const cred = await auth.createUserWithEmailAndPassword(document.getElementById("rg-email").value, pass);
    await db.collection("users").doc(cred.user.uid).set({
      name: document.getElementById("rg-name").value,
      email: document.getElementById("rg-email").value,
      phone: document.getElementById("rg-phone").value,
      batch: document.getElementById("rg-batch").value,
      role: "member",
      status: "pending",
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    document.getElementById("register-form").classList.add("hidden");
    document.getElementById("pending-notice").classList.remove("hidden");
    await auth.signOut();
  } catch (err) { alert(err.message); btn.disabled = false; btn.textContent = "Create Account"; }
});
</script>
</body>
</html>
