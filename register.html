<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Ex-Student Association Otarhat High School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily:{sans:['Inter','sans-serif'],display:['Manrope','sans-serif']}, colors:{brand:'#0E2144',accent:'#2F6FED',gold:'#C8A951'} } } };</script>
<link rel="stylesheet" href="assets/style.css">
<style>.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.auth-bg{background:linear-gradient(135deg,#0E2144,#16305C 60%,#2F6FED);}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
</head>
<body class="min-h-screen auth-bg flex items-center justify-center p-4 py-10">

<div class="surface rounded-3xl shadow-2xl max-w-md w-full p-8 md:p-10 fade-in">
  <div class="text-center mb-8">
    <img src="https://cdn.phototourl.com/free/2026-06-30-ab1ec5e9-69b4-47b3-8bf9-2d6f233e42a5.jpg" class="w-14 h-14 rounded-full mx-auto mb-3 object-cover">
    <h1 class="font-display font-extrabold text-xl">Create Account</h1>
    <p class="text-xs opacity-60 mt-1">Register for Ex-Student Association, Otarhat High School</p>
  </div>

  <div id="pending-notice" class="hidden empty-state py-6">
    <span class="material-symbols-rounded text-5xl mb-3 text-amber-500">pending_actions</span>
    <p class="font-bold mb-1">Registration Submitted!</p>
    <p class="text-sm opacity-70">An admin will review your account shortly. You can login anytime to check your approval status.</p>
    <a href="login.html" class="btn-grad px-6 py-2.5 rounded-xl font-bold text-sm mt-5 inline-block">Go to Login</a>
  </div>

  <form id="register-form" class="space-y-4">
    <input required id="rg-name" placeholder="Full Name" class="w-full px-4 py-3 rounded-xl surface border border-[var(--border)] text-sm outline-none focus:ring-2 focus:ring-accent">
    <input required type="email" id="rg-email" placeholder="Email" class="w-full px-4 py-3 rounded-xl surface border border-[var(--border)] text-sm outline-none focus:ring-2 focus:ring-accent">
    <input required id="rg-phone" placeholder="Phone Number" class="w-full px-4 py-3 rounded-xl surface border border-[var(--border)] text-sm outline-none focus:ring-2 focus:ring-accent">
    <input required id="rg-batch" placeholder="Batch (e.g. 2010)" class="w-full px-4 py-3 rounded-xl surface border border-[var(--border)] text-sm outline-none focus:ring-2 focus:ring-accent">
    <input required type="password" id="rg-pass" placeholder="Password (min 6 characters)" class="w-full px-4 py-3 rounded-xl surface border border-[var(--border)] text-sm outline-none focus:ring-2 focus:ring-accent">
    <input required type="password" id="rg-pass2" placeholder="Confirm Password" class="w-full px-4 py-3 rounded-xl surface border border-[var(--border)] text-sm outline-none focus:ring-2 focus:ring-accent">
    <label class="flex items-start gap-2 text-xs opacity-70"><input required type="checkbox" class="mt-0.5"> I agree that my account requires admin approval before I can access member-only features.</label>
    <button type="submit" id="register-submit" class="w-full py-3 btn-grad rounded-xl font-bold text-sm">Create Account</button>
  </form>

  <p id="login-link" class="text-center text-sm mt-6 opacity-70">Already have an account? <a href="login.html" class="text-accent font-bold">Login</a></p>
  <p class="text-center mt-4"><a href="index.html" class="text-xs opacity-50 hover:opacity-80">← Back to Home</a></p>
</div>

<script>
document.getElementById("register-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pass = document.getElementById("rg-pass").value, pass2 = document.getElementById("rg-pass2").value;
  if (pass !== pass2) { alert("Passwords do not match."); return; }
  const btn = document.getElementById("register-submit");
  btn.disabled = true; btn.textContent = "Creating account...";
  try {
    const cred = await auth.createUserWithEmailAndPassword(document.getElementById("rg-email").value, pass);
    await db.collection("users").doc(cred.user.uid).set({
      name: document.getElementById("rg-name").value,
      email: document.getElementById("rg-email").value,
      phone: document.getElementById("rg-phone").value,
      batch: document.getElementById("rg-batch").value,
      role: "member",
      status: "pending",
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    document.getElementById("register-form").classList.add("hidden");
    document.getElementById("login-link").classList.add("hidden");
    document.getElementById("pending-notice").classList.remove("hidden");
    await auth.signOut();
  } catch (err) {
    const map = { "auth/email-already-in-use": "This email is already registered.", "auth/weak-password": "Password should be at least 6 characters.", "auth/invalid-email": "Invalid email address." };
    alert(map[err.code] || err.message);
    btn.disabled = false; btn.textContent = "Create Account";
  }
});
</script>
</body>
</html>
