<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Ex-Student Association</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
            authDomain: "school-mangament.firebaseapp.com",
            projectId: "school-mangament",
            storageBucket: "school-mangament.firebasestorage.app",
            messagingSenderId: "593087054757",
            appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body class="bg-slate-50 text-slate-800">

<!-- Header -->
<section class="bg-[#0E2144] py-20 px-4 text-center">
    <h1 class="text-4xl font-extrabold text-white">Contact Us</h1>
    <p class="text-[#C8A951] mt-2">We'd love to hear from you</p>
</section>

<main class="max-w-5xl mx-auto px-4 py-12 grid grid-cols-1 lg:grid-cols-2 gap-8">
    
    <!-- Contact Form -->
    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
        <h2 class="text-xl font-bold mb-6">Send a Message</h2>
        <form id="contact-form" class="space-y-4">
            <input id="cf-name" placeholder="Your Name" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-[#2F6FED]" required>
            <input id="cf-email" type="email" placeholder="Your Email" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-[#2F6FED]" required>
            <textarea id="cf-message" rows="4" placeholder="Your Message" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-[#2F6FED]" required></textarea>
            <button type="submit" id="cf-submit" class="w-full py-3 bg-[#0E2144] text-white rounded-xl font-bold hover:bg-slate-900 transition">Send Message</button>
        </form>
    </div>

    <!-- Contact Info & Map -->
    <div class="space-y-6">
        <div id="contact-details" class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 space-y-4">
            <h2 class="text-xl font-bold mb-4">Office Information</h2>
            <div id="info-content" class="space-y-4">
                <p class="text-slate-400">Loading details...</p>
            </div>
        </div>
    </div>
</main>

<script>
    // ডাটা লোড
    db.collection("siteContent").doc("contact").onSnapshot((doc) => {
        const d = doc.exists ? doc.data() : {};
        const container = document.getElementById("info-content");
        
        container.innerHTML = `
            ${d.address ? `<div class="flex items-center gap-4"><span class="bg-blue-50 text-[#2F6FED] p-3 rounded-full material-symbols-rounded">location_on</span><span>${d.address}</span></div>` : ""}
            ${d.phone ? `<div class="flex items-center gap-4"><span class="bg-blue-50 text-[#2F6FED] p-3 rounded-full material-symbols-rounded">call</span><a href="tel:${d.phone}">${d.phone}</a></div>` : ""}
            ${d.email ? `<div class="flex items-center gap-4"><span class="bg-blue-50 text-[#2F6FED] p-3 rounded-full material-symbols-rounded">mail</span><a href="mailto:${d.email}">${d.email}</a></div>` : ""}
            ${d.mapUrl ? `<a href="${d.mapUrl}" target="_blank" class="flex items-center gap-4 text-[#2F6FED] font-bold hover:underline mt-4"><span class="bg-blue-50 p-3 rounded-full material-symbols-rounded">map</span>View on Google Maps</a>` : ""}
        `;
    });

    // ফর্ম সাবমিশন
    document.getElementById("contact-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("cf-submit");
        btn.textContent = "Sending...";
        
        try {
            await db.collection("contactMessages").add({
                name: document.getElementById("cf-name").value,
                email: document.getElementById("cf-email").value,
                message: document.getElementById("cf-message").value,
                createdAt: new Date()
            });
            alert("Message sent successfully!");
            e.target.reset();
        } catch (err) { alert("Failed to send."); }
        btn.textContent = "Send Message";
    });
</script>
</body>
</html>
