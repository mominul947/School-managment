<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Committee | Ex-Student Association</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
            authDomain: "school-mangament.firebaseapp.com",
            projectId: "school-mangament",
            storageBucket: "school-mangament.firebasestorage.app",
            messagingSenderId: "593087054757",
            appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body class="bg-slate-50 text-slate-800">

<!-- Header -->
<section class="bg-[#0E2144] py-20 px-4 text-center">
    <h1 class="text-4xl font-extrabold text-white">Executive Committee</h1>
    <p class="text-[#C8A951] mt-2 font-medium">Leading With Purpose</p>
</section>

<main class="max-w-6xl mx-auto px-4 py-12">
    <!-- Category Chips -->
    <div id="category-container" class="flex flex-wrap gap-2 mb-10 justify-center">
        <!-- Categories will be injected here -->
    </div>

    <!-- Search Box -->
    <div class="mb-10 text-center">
        <input id="exec-search" placeholder="Search member name..." class="w-full md:w-80 px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-[#2F6FED]">
    </div>

    <!-- Grid -->
    <div id="exec-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div class="col-span-full text-center py-10">Loading members...</div>
    </div>
</main>

<script>
    let allExec = [];
    let activeCat = "All";
    let searchTerm = "";
    
    // যে ক্যাটাগরিগুলো admin প্যানেলে আছে
    const categories = ['All', 'President', 'Vice President', 'General Secretary', 'Treasurer', 'Executive Member'];

    // ক্যাটাগরি বাটন তৈরি করা
    function renderCategories() {
        const container = document.getElementById("category-container");
        container.innerHTML = categories.map(cat => `
            <button onclick="filterCat('${cat}')" class="chip px-5 py-2 rounded-full text-xs font-bold transition ${activeCat === cat ? 'bg-[#0E2144] text-white' : 'bg-white border hover:bg-slate-100'}">
                ${cat}
            </button>
        `).join("");
    }

    function filterCat(cat) {
        activeCat = cat;
        renderCategories();
        render();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ডেটা ফেচ করা
    db.collection("executive").onSnapshot((snap) => {
        allExec = snap.docs.map((d) => ({ id: d.id, ...d.data() })).filter((t) => t.status !== "inactive");
        renderCategories();
        render();
    });

    function render() {
        let items = allExec;
        if (activeCat !== "All") items = items.filter((t) => t.category === activeCat);
        if (searchTerm) items = items.filter((t) => (t.name || "").toLowerCase().includes(searchTerm));
        
        const grid = document.getElementById("exec-grid");
        if (!items.length) { grid.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400">No members found in this category.</div>`; return; }
        
        grid.innerHTML = items.map((m) => `
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center hover:shadow-lg transition flex flex-col items-center">
                <img src="${m.photo || 'https://placehold.co/300x300'}" class="w-24 h-24 rounded-full object-cover mb-4 border-4 border-blue-50">
                <h3 class="font-bold text-lg text-[#0E2144]">${escapeHtml(m.name || '')}</h3>
                <p class="text-xs text-[#2F6FED] font-bold uppercase tracking-wider mt-1">${escapeHtml(m.designation || '')}</p>
                <p class="text-[11px] text-slate-400 mt-1">Batch: ${escapeHtml(m.batch || '-')}</p>
                <p class="text-xs text-slate-600 mt-4 leading-relaxed line-clamp-2">${escapeHtml(m.description || '')}</p>
                <div class="flex justify-center gap-3 mt-5">
                    ${m.facebook ? `<a href="${m.facebook}" target="_blank" class="text-slate-400 hover:text-blue-600 font-bold text-xs">FB</a>` : ""}
                    ${m.linkedin ? `<a href="${m.linkedin}" target="_blank" class="text-slate-400 hover:text-blue-700 font-bold text-xs">LI</a>` : ""}
                </div>
            </div>`).join("");
    }

    document.getElementById("exec-search").addEventListener("input", (e) => {
        searchTerm = e.target.value.toLowerCase();
        render();
    });
</script>
</body>
</html>
