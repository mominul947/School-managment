<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Committee | Ex-Student Association Otarhat High School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily:{sans:['Inter','sans-serif'],display:['Manrope','sans-serif']}, colors:{brand:'#0E2144',accent:'#2F6FED',gold:'#C8A951'} } } };</script>
<link rel="stylesheet" href="assets/style.css">
<style>.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.chip.active{background:var(--brand); color:#fff;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
</head>
<body class="pb-16 lg:pb-0">
<div id="site-header"></div>

<section class="pt-32 pb-10 bg-brand text-center">
  <p class="text-gold font-bold text-xs uppercase tracking-widest mb-2">Leading With Purpose</p>
  <h1 class="font-display font-extrabold text-3xl md:text-4xl text-white">Executive Committee</h1>
</section>

<main class="max-w-6xl mx-auto px-4 py-12">
  <div class="flex flex-col md:flex-row gap-3 md:items-center md:justify-between mb-8">
    <div id="category-chips" class="flex flex-wrap gap-2">
      <button data-cat="all" class="chip active px-4 py-2 rounded-full text-xs font-bold surface">All</button>
      <button data-cat="President" class="chip px-4 py-2 rounded-full text-xs font-bold surface">President</button>
      <button data-cat="Vice President" class="chip px-4 py-2 rounded-full text-xs font-bold surface">Vice President</button>
      <button data-cat="General Secretary" class="chip px-4 py-2 rounded-full text-xs font-bold surface">General Secretary</button>
      <button data-cat="Treasurer" class="chip px-4 py-2 rounded-full text-xs font-bold surface">Treasurer</button>
      <button data-cat="Executive Member" class="chip px-4 py-2 rounded-full text-xs font-bold surface">Executive Member</button>
    </div>
    <div class="relative w-full md:w-64">
      <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 opacity-40 text-lg">search</span>
      <input id="exec-search" placeholder="Search name..." class="w-full pl-9 pr-3 py-2.5 rounded-xl surface text-sm outline-none focus:ring-2 focus:ring-accent">
    </div>
  </div>

  <div id="exec-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <div class="skeleton h-80"></div><div class="skeleton h-80"></div><div class="skeleton h-80"></div><div class="skeleton h-80"></div>
  </div>
</main>

<div id="site-footer"></div>
<script src="assets/site.js"></script>
<script>
bootSite("executive.html");
let allExec = [], activeCat = "all", searchTerm = "";

db.collection("executive").onSnapshot((snap) => {
  allExec = snap.docs.map((d) => ({ id: d.id, ...d.data() })).filter((t) => t.status !== "inactive");
  render();
}, () => { document.getElementById("exec-grid").innerHTML = `<div class="empty-state col-span-full">Could not load committee.</div>`; });

function render() {
  let items = allExec;
  if (activeCat !== "all") items = items.filter((t) => t.category === activeCat);
  if (searchTerm) items = items.filter((t) => (t.name || "").toLowerCase().includes(searchTerm));
  const grid = document.getElementById("exec-grid");
  if (!items.length) { grid.innerHTML = `<div class="empty-state col-span-full"><span class="material-symbols-rounded text-4xl mb-2 opacity-40">groups</span>No members found.</div>`; return; }
  grid.innerHTML = items.map((m) => `
    <div class="card surface p-5 text-center">
      <img src="${m.photo || "https://placehold.co/300x300?text=Photo"}" class="w-24 h-24 rounded-full object-cover mx-auto mb-3 border-4 border-accent/20">
      <h3 class="font-bold">${escapeHtml(m.name)}</h3>
      <p class="text-xs text-accent font-semibold mt-1">${escapeHtml(m.designation || "")}</p>
      <p class="text-[11px] opacity-50 mt-0.5">Batch ${escapeHtml(m.batch || "-")}</p>
      <p class="text-xs opacity-70 mt-2 line-clamp-3">${escapeHtml(m.description || "")}</p>
      <div class="flex justify-center gap-2 mt-3">
        ${m.facebook ? `<a href="${m.facebook}" target="_blank" class="w-8 h-8 rounded-full bg-black/5 dark:bg-white/10 flex items-center justify-center hover:text-accent"><span class="material-symbols-rounded text-base">thumb_up</span></a>` : ""}
        ${m.linkedin ? `<a href="${m.linkedin}" target="_blank" class="w-8 h-8 rounded-full bg-black/5 dark:bg-white/10 flex items-center justify-center hover:text-accent"><span class="material-symbols-rounded text-base">work</span></a>` : ""}
      </div>
    </div>`).join("");
}
document.getElementById("category-chips").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-cat]"); if (!btn) return;
  document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
  btn.classList.add("active"); activeCat = btn.dataset.cat; render();
});
document.getElementById("exec-search").addEventListener("input", (e) => { searchTerm = e.target.value.toLowerCase(); render(); });
</script>
</body>
</html>
