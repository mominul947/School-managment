<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Otarhat High School</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script>
        // আপনার Firebase কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
            authDomain: "school-mangament.firebaseapp.com",
            projectId: "school-mangament",
            storageBucket: "school-mangament.firebasestorage.app",
            messagingSenderId: "593087054757",
            appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body class="bg-slate-50 min-h-screen">

<div class="max-w-6xl mx-auto p-6 md:p-10">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-3xl md:text-4xl font-extrabold text-[#0E2144]">Upcoming Events</h1>
    </div>
    
    <!-- Events Grid -->
    <div id="event-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="col-span-full text-center py-20 text-slate-400">Loading events...</div>
    </div>
</div>

<!-- Modal -->
<div id="booking-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
        <h2 id="modal-title" class="text-xl font-bold text-[#0E2144] mb-4">Book Your Seat</h2>
        <div id="payment-details" class="text-sm bg-blue-50 p-4 rounded-xl mb-6 border border-blue-100 text-blue-800 font-medium"></div>
        <input id="tx-id" placeholder="Transaction ID (Required)" class="w-full px-4 py-3 rounded-xl border border-slate-200 mb-6 outline-none focus:ring-2 focus:ring-blue-500">
        <div class="flex gap-3">
            <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition">Cancel</button>
            <button onclick="confirmBooking()" class="flex-1 py-3 bg-[#0E2144] text-white rounded-xl font-bold hover:bg-slate-900 transition">Submit</button>
        </div>
    </div>
</div>

<script>
    let selectedEventId = null;

    // ইভেন্ট লোড করার লজিক
    db.collection("events").get().then((snap) => {
        const grid = document.getElementById("event-grid");
        if (snap.empty) {
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400">No events available at this moment.</div>`;
            return;
        }

        grid.innerHTML = snap.docs.map(doc => {
            const e = doc.data();
            return `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-all">
                <img src="${e.banner || 'https://placehold.co/400x200'}" class="w-full h-48 object-cover">
                <div class="p-6">
                    <h3 class="font-bold text-lg text-[#0E2144] mb-2">${e.title || 'Untitled Event'}</h3>
                    <p class="text-slate-500 text-sm mb-4 line-clamp-2">${e.description || 'No description available.'}</p>
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-xs font-bold text-slate-400 uppercase">${e.eventDate || 'TBA'}</span>
                        <span class="text-xs font-bold ${e.paymentEnabled ? 'text-amber-600' : 'text-blue-600'}">
                            ${e.paymentEnabled ? 'Paid Event' : 'Free Event'}
                        </span>
                    </div>
                    <button onclick="openModal('${doc.id}', '${e.title}', '${e.paymentDetails || ''}', ${!!e.paymentEnabled})" 
                        class="w-full py-3 rounded-xl font-bold ${e.paymentEnabled ? 'bg-amber-600 text-white' : 'bg-[#0E2144] text-white'} transition-transform hover:scale-[1.02]">
                        ${e.paymentEnabled ? 'Book Seat' : 'Register Now'}
                    </button>
                </div>
            </div>`;
        }).join('');
    }).catch(err => {
        console.error("Firebase Error: ", err);
        document.getElementById("event-grid").innerHTML = `<div class="col-span-full text-center py-20 text-red-400">Error loading events. Please check Firebase rules.</div>`;
    });

    function openModal(id, title, details, isPaid) {
        selectedEventId = id;
        document.getElementById("modal-title").textContent = title;
        document.getElementById("payment-details").innerHTML = isPaid ? `<strong>Payment Info:</strong><br>${details}` : "This is a free event. Click submit to register.";
        document.getElementById("booking-modal").classList.remove("hidden");
    }

    function closeModal() { document.getElementById("booking-modal").classList.add("hidden"); }

    async function confirmBooking() {
        const tx = document.getElementById("tx-id").value;
        const isPaid = document.getElementById("payment-details").innerText.includes("Payment Info");
        
        if(isPaid && !tx) { alert("Please enter Transaction ID"); return; }
        
        try {
            await db.collection("events").doc(selectedEventId).collection("registrations").add({
                txId: tx || "Free Registration",
                status: "pending",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Success! Your registration request has been submitted.");
            closeModal();
            document.getElementById("tx-id").value = "";
        } catch(e) { 
            alert("Error: " + e.message); 
        }
    }
</script>
</body>
</html>
