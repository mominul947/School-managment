<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story | Ex-Student Association Otarhat High School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily:{sans:['Inter','sans-serif'],display:['Manrope','sans-serif']}, colors:{brand:'#0E2144',accent:'#2F6FED',gold:'#C8A951'} } } };</script>
<link rel="stylesheet" href="assets/style.css">
<style>
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.timeline-item{position:relative; padding-left:2.25rem; padding-bottom:2rem; border-left:2px solid var(--border);}
.timeline-item:last-child{border-left-color:transparent;}
.timeline-item::before{content:'';position:absolute; left:-7px; top:2px; width:12px; height:12px; border-radius:50%; background:var(--accent);}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
</head>
<body class="pb-16 lg:pb-0">
<div id="site-header"></div>

<section class="pt-32 pb-10 bg-brand text-center">
  <p class="text-gold font-bold text-xs uppercase tracking-widest mb-2">Our Journey</p>
  <h1 class="font-display font-extrabold text-3xl md:text-4xl text-white">Our Story</h1>
</section>

<main class="max-w-3xl mx-auto px-4 py-14">
  <div class="surface card p-6 md:p-10">
    <img id="story-image" class="w-full h-64 object-cover rounded-2xl mb-8 hidden">
    <div id="story-content" class="pl-2">
      <div class="skeleton h-4 w-full mb-3"></div><div class="skeleton h-4 w-5/6 mb-3"></div><div class="skeleton h-4 w-2/3"></div>
    </div>
  </div>
</main>

<div id="site-footer"></div>
<script src="assets/site.js"></script>
<script>
bootSite("ourstory.html");
db.collection("siteContent").doc("ourStory").onSnapshot((doc) => {
  const box = document.getElementById("story-content");
  const img = document.getElementById("story-image");
  if (!doc.exists) { box.innerHTML = `<div class="empty-state"><span class="material-symbols-rounded text-4xl mb-2 opacity-40">auto_stories</span>No content has been added to Our Story yet.</div>`; return; }
  const d = doc.data();
  if (d.image) { img.src = d.image; img.classList.remove("hidden"); }
  const lines = (d.content || "").split("\n").filter((l) => l.trim());
  box.innerHTML = lines.length ? lines.map((l) => `<div class="timeline-item"><p class="text-[15px] leading-relaxed opacity-90">${escapeHtml(l)}</p></div>`).join("") : `<div class="empty-state">No content added yet.</div>`;
}, () => { document.getElementById("story-content").innerHTML = `<div class="empty-state">Could not load content.</div>`; });
</script>
</body>
</html>
