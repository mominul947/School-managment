<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story | Ex-Student Association</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = { 
        theme: { extend: { fontFamily:{sans:['Inter','sans-serif'],display:['Manrope','sans-serif']}, colors:{brand:'#0E2144',accent:'#2F6FED',gold:'#C8A951'} } } 
    };
</script>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
        authDomain: "school-mangament.firebaseapp.com",
        projectId: "school-mangament",
        storageBucket: "school-mangament.firebasestorage.app",
        messagingSenderId: "593087054757",
        appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
</script>

<style>
.timeline-item{position:relative; padding-left:2.25rem; padding-bottom:2rem; border-left:2px solid #e2e8f0;}
.timeline-item:last-child{border-left-color:transparent;}
.timeline-item::before{content:'';position:absolute; left:-7px; top:2px; width:12px; height:12px; border-radius:50%; background:#2F6FED;}
.skeleton{ background:linear-gradient(90deg,#e7ebf3 25%,#f2f4f9 37%,#e7ebf3 63%); background-size:400% 100%; animation:sk 1.4s ease infinite; border-radius:1rem; }
@keyframes sk{ 0%{background-position:100% 50%} 100%{background-position:0 50%} }
</style>
</head>
<body class="bg-slate-50">

<section class="pt-32 pb-10 bg-brand text-center">
  <p class="text-gold font-bold text-xs uppercase tracking-widest mb-2">Our Journey</p>
  <h1 class="font-display font-extrabold text-3xl md:text-4xl text-white">Our Story</h1>
</section>

<main class="max-w-3xl mx-auto px-4 py-14">
  <div class="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-100">
    <!-- Image -->
    <img id="story-image" class="w-full h-64 object-cover rounded-2xl mb-8 hidden shadow-md">
    
    <!-- Content -->
    <div id="story-content" class="pl-2">
      <div class="skeleton h-4 w-full mb-3"></div>
      <div class="skeleton h-4 w-5/6 mb-3"></div>
      <div class="skeleton h-4 w-2/3"></div>
    </div>
  </div>
</main>

<script>
// Firebase থেকে Our Story ডেটা লোড করা
db.collection("siteContent").doc("ourStory").onSnapshot((doc) => {
  const box = document.getElementById("story-content");
  const img = document.getElementById("story-image");
  
  if (!doc.exists) { 
    box.innerHTML = `<div class="text-center py-10 opacity-50">আমাদের গল্পটি এখনো লেখা হয়নি।</div>`; 
    return; 
  }
  
  const d = doc.data();
  
  // ইমেজ সেট করা
  if (d.image) { 
    img.src = d.image; 
    img.classList.remove("hidden"); 
  } else {
    img.classList.add("hidden");
  }
  
  // লেখা ফরম্যাট করা (প্রতিটি লাইনকে টাইমলাইন আইটেম হিসেবে দেখানো)
  const lines = (d.content || "").split("\n").filter((l) => l.trim());
  
  if (lines.length > 0) {
    box.innerHTML = lines.map((l) => `
      <div class="timeline-item">
        <p class="text-[15px] leading-relaxed text-slate-700">${escapeHtml(l)}</p>
      </div>`).join("");
  } else {
    box.innerHTML = `<div class="text-center py-10 opacity-50">কোনো তথ্য যোগ করা হয়নি।</div>`;
  }
}, (err) => { 
  console.error(err);
  document.getElementById("story-content").innerHTML = `<div class="text-center py-10 text-red-500">লোড করতে সমস্যা হয়েছে।</div>`; 
});

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
