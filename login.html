<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Ex-Student Association Otarhat High School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily:{sans:['Inter','sans-serif'],display:['Manrope','sans-serif']}, colors:{brand:'#0E2144',accent:'#2F6FED',gold:'#C8A951'} } } };</script>
<link rel="stylesheet" href="assets/style.css">
<style>.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.auth-bg{background:linear-gradient(135deg,#0E2144,#16305C 60%,#2F6FED);}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
</head>
<body class="min-h-screen auth-bg flex items-center justify-center p-4">

<div class="surface rounded-3xl shadow-2xl max-w-md w-full p-8 md:p-10 fade-in">
  <div class="text-center mb-8">
    <img src="https://cdn.phototourl.com/free/2026-06-30-ab1ec5e9-69b4-47b3-8bf9-2d6f233e42a5.jpg" class="w-14 h-14 rounded-full mx-auto mb-3 object-cover">
    <h1 class="font-display font-extrabold text-xl">Welcome Back</h1>
    <p class="text-xs opacity-60 mt-1">Login to Ex-Student Association, Otarhat High School</p>
  </div>

  <form id="login-form" class="space-y-4">
    <input required type="email" id="li-email" placeholder="Email" class="w-full px-4 py-3 rounded-xl surface border border-[var(--border)] text-sm outline-none focus:ring-2 focus:ring-accent">
    <div class="relative">
      <input required type="password" id="li-pass" placeholder="Password" class="w-full px-4 py-3 rounded-xl surface border border-[var(--border)] text-sm outline-none focus:ring-2 focus:ring-accent">
      <button type="button" onclick="togglePass()" class="absolute right-3 top-1/2 -translate-y-1/2 opacity-50"><span class="material-symbols-rounded text-lg" id="pass-eye">visibility</span></button>
    </div>
    <div class="text-right"><button type="button" onclick="resetPassword()" class="text-xs font-semibold text-accent">Forgot Password?</button></div>
    <button type="submit" id="login-submit" class="w-full py-3 btn-grad rounded-xl font-bold text-sm">Login</button>
  </form>

  <p class="text-center text-sm mt-6 opacity-70">Don't have an account? <a href="register.html" class="text-accent font-bold">Register</a></p>
  <p class="text-center mt-4"><a href="index.html" class="text-xs opacity-50 hover:opacity-80">← Back to Home</a></p>
</div>

<script>
const params = new URLSearchParams(location.search);
document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("login-submit");
  btn.disabled = true; btn.textContent = "Logging in...";
  try {
    await auth.signInWithEmailAndPassword(document.getElementById("li-email").value, document.getElementById("li-pass").value);
    window.location.href = params.get("next") || "profile.html";
  } catch (err) {
    alert(loginErrorMessage(err));
    btn.disabled = false; btn.textContent = "Login";
  }
});
function loginErrorMessage(err) {
  const map = { "auth/user-not-found": "No account found with this email.", "auth/wrong-password": "Incorrect password.", "auth/invalid-email": "Invalid email address.", "auth/too-many-requests": "Too many attempts. Try again later." };
  return map[err.code] || err.message;
}
function togglePass() {
  const input = document.getElementById("li-pass");
  const eye = document.getElementById("pass-eye");
  input.type = input.type === "password" ? "text" : "password";
  eye.textContent = input.type === "password" ? "visibility" : "visibility_off";
}
function resetPassword() {
  const email = document.getElementById("li-email").value;
  if (!email) { alert("Enter your email above first, then click Forgot Password."); return; }
  auth.sendPasswordResetEmail(email).then(() => alert("Password reset email sent to " + email)).catch((err) => alert(err.message));
}
</script>
</body>
</html>
