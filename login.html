<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Ex-Student Association</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
    authDomain: "school-mangament.firebaseapp.com",
    projectId: "school-mangament",
    storageBucket: "school-mangament.firebasestorage.app",
    messagingSenderId: "593087054757",
    appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
</script>
<style>.auth-bg{background:linear-gradient(135deg,#0E2144,#16305C 60%,#2F6FED);}</style>
</head>
<body class="min-h-screen auth-bg flex items-center justify-center p-4">

<div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 md:p-10">
  <div class="text-center mb-8">
    <h1 class="font-bold text-2xl text-[#0E2144]">Welcome Back</h1>
  </div>

  <form id="login-form" class="space-y-4">
    <input required type="email" id="li-email" placeholder="Email" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
    <input required type="password" id="li-pass" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
    <button type="submit" id="login-submit" class="w-full py-3 bg-[#0E2144] text-white rounded-xl font-bold text-sm hover:bg-blue-900 transition">Login</button>
  </form>
  <p class="text-center text-sm mt-6">Don't have an account? <a href="register.html" class="text-blue-600 font-bold">Register</a></p>
</div>

<script>
document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("login-submit");
  btn.disabled = true; btn.textContent = "Logging in...";
  try {
    await auth.signInWithEmailAndPassword(document.getElementById("li-email").value, document.getElementById("li-pass").value);
    window.location.href = "profile.html"; 
  } catch (err) { alert(err.message); btn.disabled = false; btn.textContent = "Login"; }
});
</script>
</body>
</html>
