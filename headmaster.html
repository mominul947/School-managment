<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers & Staff | Ex-Student Association</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
            authDomain: "school-mangament.firebaseapp.com",
            projectId: "school-mangament",
            storageBucket: "school-mangament.firebasestorage.app",
            messagingSenderId: "593087054757",
            appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
    <style>
        .chip.active { background-color: #0E2144; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<!-- Header -->
<section class="bg-[#0E2144] py-20 px-4 text-center">
    <h1 class="text-4xl font-extrabold text-white">Headmaster & Teachers</h1>
    <p class="text-[#C8A951] mt-2 font-medium">Our Honorable Educators</p>
</section>

<main class="max-w-6xl mx-auto px-4 py-12">
    <!-- Category & Search -->
    <div class="flex flex-col md:flex-row gap-4 mb-10 items-center justify-between">
        <div id="category-chips" class="flex flex-wrap gap-2">
            <button data-cat="all" class="chip active px-5 py-2 rounded-full text-xs font-bold border border-slate-200 bg-white transition">All</button>
            <button data-cat="Headmaster" class="chip px-5 py-2 rounded-full text-xs font-bold border border-slate-200 bg-white transition">Headmaster</button>
            <button data-cat="Assistant Headmaster" class="chip px-5 py-2 rounded-full text-xs font-bold border border-slate-200 bg-white transition">Asst. Headmaster</button>
            <button data-cat="Senior Teacher" class="chip px-5 py-2 rounded-full text-xs font-bold border border-slate-200 bg-white transition">Senior Teacher</button>
            <button data-cat="Teacher" class="chip px-5 py-2 rounded-full text-xs font-bold border border-slate-200 bg-white transition">Teacher</button>
            <button data-cat="Staff" class="chip px-5 py-2 rounded-full text-xs font-bold border border-slate-200 bg-white transition">Staff</button>
        </div>
        <input id="teacher-search" placeholder="Search teacher name..." class="w-full md:w-64 px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-[#2F6FED]">
    </div>

    <!-- Grid -->
    <div id="teacher-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div class="col-span-full text-center py-10">Loading teachers...</div>
    </div>
</main>

<!-- Details Modal -->
<div id="teacher-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center relative">
        <button onclick="document.getElementById('teacher-modal').classList.add('hidden')" class="absolute top-4 right-4 text-slate-400">✕</button>
        <img id="tm-photo" class="w-24 h-24 rounded-full object-cover mx-auto mb-4">
        <h3 id="tm-name" class="font-bold text-lg text-[#0E2144]"></h3>
        <p id="tm-designation" class="text-xs text-[#2F6FED] font-bold mt-1"></p>
        <p id="tm-desc" class="text-xs text-slate-600 mt-4 italic"></p>
    </div>
</div>

<script>
    let allTeachers = [], activeCat = "all", searchTerm = "";

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    db.collection("teachers").onSnapshot((snap) => {
        allTeachers = snap.docs.map((d) => ({ id: d.id, ...d.data() })).filter((t) => t.status !== "inactive");
        render();
    });

    function render() {
        let items = allTeachers;
        if (activeCat !== "all") items = items.filter((t) => t.category === activeCat);
        if (searchTerm) items = items.filter((t) => (t.name || "").toLowerCase().includes(searchTerm));
        
        const grid = document.getElementById("teacher-grid");
        if (!items.length) { grid.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400">No teachers found.</div>`; return; }
        
        grid.innerHTML = items.map((t) => `
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 text-center hover:shadow-lg transition cursor-pointer" onclick='openModal(${JSON.stringify(t).replace(/'/g, "&apos;")})'>
                <img src="${t.photo || 'https://placehold.co/300x300'}" class="w-24 h-24 rounded-full object-cover mx-auto mb-4">
                <h3 class="font-bold text-sm text-[#0E2144]">${escapeHtml(t.name || '')}</h3>
                <p class="text-xs text-[#2F6FED] font-bold mt-1">${escapeHtml(t.designation || '')}</p>
                <p class="text-[10px] text-slate-400 mt-1 uppercase">${escapeHtml(t.category || '')}</p>
            </div>`).join("");
    }

    function openModal(t) {
        document.getElementById("tm-photo").src = t.photo || 'https://placehold.co/300x300';
        document.getElementById("tm-name").textContent = t.name;
        document.getElementById("tm-designation").textContent = t.designation;
        document.getElementById("tm-desc").textContent = t.description;
        document.getElementById("teacher-modal").classList.remove("hidden");
    }

    document.getElementById("category-chips").addEventListener("click", (e) => {
        if (!e.target.dataset.cat) return;
        document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        e.target.classList.add("active");
        activeCat = e.target.dataset.cat;
        render();
    });

    document.getElementById("teacher-search").addEventListener("input", (e) => {
        searchTerm = e.target.value.toLowerCase();
        render();
    });
</script>
</body>
</html>
