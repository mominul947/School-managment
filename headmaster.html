<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Former Headmasters & Teachers | Ex-Student Association Otarhat High School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily:{sans:['Inter','sans-serif'],display:['Manrope','sans-serif']}, colors:{brand:'#0E2144',accent:'#2F6FED',gold:'#C8A951'} } } };</script>
<link rel="stylesheet" href="assets/style.css">
<style>.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.chip{transition:all .2s ease;}
.chip.active{background:var(--brand); color:#fff;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/firebase-config.js"></script>
</head>
<body class="pb-16 lg:pb-0">
<div id="site-header"></div>

<section class="pt-32 pb-10 bg-brand text-center">
  <p class="text-gold font-bold text-xs uppercase tracking-widest mb-2">Our Educators</p>
  <h1 class="font-display font-extrabold text-3xl md:text-4xl text-white">Headmasters & Teachers</h1>
</section>

<main class="max-w-6xl mx-auto px-4 py-12">
  <div class="flex flex-col md:flex-row gap-3 md:items-center md:justify-between mb-8">
    <div id="category-chips" class="flex flex-wrap gap-2">
      <button data-cat="all" class="chip active px-4 py-2 rounded-full text-xs font-bold surface">All</button>
      <button data-cat="Headmaster" class="chip px-4 py-2 rounded-full text-xs font-bold surface">Headmaster</button>
      <button data-cat="Assistant Headmaster" class="chip px-4 py-2 rounded-full text-xs font-bold surface">Assistant Headmaster</button>
      <button data-cat="Senior Teacher" class="chip px-4 py-2 rounded-full text-xs font-bold surface">Senior Teacher</button>
      <button data-cat="Teacher" class="chip px-4 py-2 rounded-full text-xs font-bold surface">Teacher</button>
      <button data-cat="Staff" class="chip px-4 py-2 rounded-full text-xs font-bold surface">Staff</button>
    </div>
    <div class="relative w-full md:w-64">
      <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 opacity-40 text-lg">search</span>
      <input id="teacher-search" placeholder="Search name..." class="w-full pl-9 pr-3 py-2.5 rounded-xl surface text-sm outline-none focus:ring-2 focus:ring-accent">
    </div>
  </div>

  <div id="teacher-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <div class="skeleton h-72"></div><div class="skeleton h-72"></div><div class="skeleton h-72"></div><div class="skeleton h-72"></div>
  </div>
</main>

<!-- Detail modal -->
<div id="teacher-modal" class="hidden fixed inset-0 bg-black/60 z-[150] items-center justify-center p-4">
  <div class="surface rounded-2xl max-w-md w-full p-6 relative fade-in">
    <button onclick="document.getElementById('teacher-modal').classList.add('hidden')" class="absolute top-3 right-3 p-1.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/10"><span class="material-symbols-rounded">close</span></button>
    <img id="tm-photo" class="w-24 h-24 rounded-full object-cover mx-auto mb-4 border-4 border-accent/20">
    <h3 id="tm-name" class="text-center font-display font-extrabold text-xl"></h3>
    <p id="tm-designation" class="text-center text-accent font-semibold text-sm mb-4"></p>
    <p id="tm-desc" class="text-sm opacity-75 leading-relaxed text-center"></p>
  </div>
</div>

<div id="site-footer"></div>
<script src="assets/site.js"></script>
<script>
bootSite("headmaster.html");
let allTeachers = [], activeCat = "all", searchTerm = "";

db.collection("teachers").onSnapshot((snap) => {
  allTeachers = snap.docs.map((d) => ({ id: d.id, ...d.data() })).filter((t) => t.status !== "inactive");
  render();
}, () => { document.getElementById("teacher-grid").innerHTML = `<div class="empty-state col-span-full">Could not load teachers.</div>`; });

function render() {
  let items = allTeachers;
  if (activeCat !== "all") items = items.filter((t) => t.category === activeCat);
  if (searchTerm) items = items.filter((t) => (t.name || "").toLowerCase().includes(searchTerm));
  const grid = document.getElementById("teacher-grid");
  if (!items.length) { grid.innerHTML = `<div class="empty-state col-span-full"><span class="material-symbols-rounded text-4xl mb-2 opacity-40">school</span>No teachers found.</div>`; return; }
  grid.innerHTML = items.map((t) => `
    <div class="card surface overflow-hidden cursor-pointer" onclick='openTeacher(${JSON.stringify(t).replace(/'/g, "&apos;")})'>
      <img src="${t.photo || "https://placehold.co/300x300?text=Photo"}" class="w-full h-56 object-cover">
      <div class="p-4 text-center">
        <h3 class="font-bold">${escapeHtml(t.name)}</h3>
        <p class="text-xs text-accent font-semibold mt-1">${escapeHtml(t.designation || "")}</p>
        <p class="text-[11px] opacity-50 mt-1">${escapeHtml(t.category || "")}</p>
      </div>
    </div>`).join("");
}
function openTeacher(t) {
  document.getElementById("tm-photo").src = t.photo || "https://placehold.co/300x300?text=Photo";
  document.getElementById("tm-name").textContent = t.name || "";
  document.getElementById("tm-designation").textContent = t.designation || "";
  document.getElementById("tm-desc").textContent = t.description || "";
  document.getElementById("teacher-modal").classList.remove("hidden");
  document.getElementById("teacher-modal").classList.add("flex");
}
document.getElementById("category-chips").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-cat]"); if (!btn) return;
  document.querySelectorAll(".chip").forEach((c) => c.classList.remove("active"));
  btn.classList.add("active"); activeCat = btn.dataset.cat; render();
});
document.getElementById("teacher-search").addEventListener("input", (e) => { searchTerm = e.target.value.toLowerCase(); render(); });
</script>
</body>
</html>
