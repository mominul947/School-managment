<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Ex-Student Association</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBHYYbAxbQVv9nL1r6b_anOa52r7_rOzEk",
            authDomain: "school-mangament.firebaseapp.com",
            projectId: "school-mangament",
            storageBucket: "school-mangament.firebasestorage.app",
            messagingSenderId: "593087054757",
            appId: "1:593087054757:web:a946aa37387c2a91a11e4c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
    </script>
</head>
<body class="bg-slate-50">

<div class="max-w-4xl mx-auto p-6 py-12">
    <!-- প্রোফাইল কার্ড -->
    <div id="profile-container" class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
        <h2 class="text-2xl font-bold mb-6 text-[#0E2144]">My Profile</h2>
        
        <div id="user-info" class="space-y-4">
            <!-- তথ্য এখানে লোড হবে -->
            <p class="text-slate-500">Loading your profile...</p>
        </div>

        <div class="mt-8 pt-6 border-t">
            <button onclick="auth.signOut().then(() => window.location.href='login.html')" 
                    class="bg-red-50 text-red-600 px-6 py-2 rounded-xl font-bold text-sm">Logout</button>
        </div>
    </div>
</div>

<script>
    // ইউজার লগইন চেক করা
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = "login.html"; // লগইন না থাকলে রিডাইরেক্ট
            return;
        }

        // Firestore থেকে ইউজার ডাটা আনা
        try {
            const doc = await db.collection("users").doc(user.uid).get();
            if (doc.exists) {
                const data = doc.data();
                renderProfile(data, user.email);
            }
        } catch (e) {
            console.error("Error fetching profile:", e);
        }
    });

    // ডাটা স্ক্রিনে দেখানো
    function renderProfile(d, email) {
        const container = document.getElementById("user-info");
        container.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase">Full Name</label>
                    <p class="font-semibold text-lg">${d.name || 'N/A'}</p>
                </div>
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase">Email</label>
                    <p class="font-semibold text-lg">${email}</p>
                </div>
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase">Phone</label>
                    <p class="font-semibold text-lg">${d.phone || 'N/A'}</p>
                </div>
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase">Batch</label>
                    <p class="font-semibold text-lg">${d.batch || 'N/A'}</p>
                </div>
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase">Status</label>
                    <p class="font-semibold text-lg capitalize text-blue-600">${d.status || 'Pending'}</p>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
